<div class="min-h-screen bg-[radial-gradient(circle_at_top_right,_rgba(34,197,94,0.15),_transparent_40%),linear-gradient(135deg,_#f8fff5_0%,_#e8f7f3_50%,_#dff5f0_100%)] flex items-center justify-center px-4 py-8">
    <!-- Contenedor Principal -->
    <div class="w-full max-w-md">
        <!-- Tarjeta de Éxito -->
        <div class="bg-white/90 backdrop-blur-md rounded-2xl shadow-[0_20px_60px_rgba(34,197,94,0.15)] border border-emerald-200 p-8 sm:p-10 text-center">
            
            <!-- Ícono de Éxito Animado -->
            <div class="flex justify-center mb-6">
                <div class="relative w-20 h-20 rounded-full bg-gradient-to-br from-green-400 to-emerald-500 flex items-center justify-center shadow-lg">
                    <span class="text-5xl animate-pulse">✓</span>
                </div>
            </div>

            <!-- Título -->
            <h1 class="text-3xl sm:text-4xl font-bold bg-gradient-to-r from-green-700 to-emerald-600 bg-clip-text text-transparent mb-4">
                ¡Correo Verificado!
            </h1>

            <!-- Descripción -->
            <p class="text-gray-600 text-base sm:text-lg mb-8 leading-relaxed">
                Tu correo electrónico ha sido verificado correctamente. Ahora puedes iniciar sesión en tu cuenta y disfrutar de todas las funcionalidades.
            </p>

            <!-- Contador de Redirección -->
            <div class="bg-gradient-to-r from-emerald-50 to-teal-50 rounded-xl p-4 mb-8 border border-emerald-200">
                <p class="text-sm text-gray-600 mb-2">Redirigiendo automáticamente en</p>
                <div class="flex items-center justify-center gap-2">
                    <span class="text-5xl font-bold text-green-600">{{ counterClock() }}</span>
                    <span class="text-xl text-gray-600 font-semibold">s</span>
                </div>
            </div>

            <!-- Botón Principal -->
            <button
                (click)="router.navigate(['/login'])"
                class="w-full bg-gradient-to-r from-green-500 to-emerald-600 hover:from-green-600 hover:to-emerald-700 text-white font-bold py-3 px-6 rounded-xl transition-all duration-300 transform hover:scale-105 shadow-lg hover:shadow-xl mb-4 flex items-center justify-center gap-2">
                <span class="material-symbols-outlined text-xl">login</span>
                Iniciar Sesión
            </button>

            <!-- Botón Secundario -->
            <button
                (click)="router.navigate(['/'])"
                class="w-full bg-white hover:bg-gray-50 text-emerald-700 font-semibold py-2.5 px-6 rounded-xl transition-all duration-300 border-2 border-emerald-200 hover:border-emerald-400">
                Volver al Inicio
            </button>

            <!-- Información Adicional -->
            <div class="mt-8 pt-6 border-t border-emerald-100">
                <p class="text-xs text-gray-500">
                    Si tienes problemas para acceder, contacta con nuestro equipo de soporte.
                </p>
            </div>
        </div>

        <!-- Decoración Inferior -->
        <div class="mt-8 flex justify-center gap-2">
            <div class="w-2 h-2 rounded-full bg-green-400 opacity-60"></div>
            <div class="w-2 h-2 rounded-full bg-emerald-400 opacity-40"></div>
            <div class="w-2 h-2 rounded-full bg-teal-400 opacity-20"></div>
        </div>
    </div>
</div>
