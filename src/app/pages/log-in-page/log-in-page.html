<div class="h-[82vh]">
  <div class="w-full h-full flex flex-col items-center justify-center">
    <h1 class="text-3xl font-bold mb-6">Iniciar Sesión</h1>
    <form class="w-full max-w-sm bg-white p-8 rounded-lg shadow-md">
      <div class="mb-4">
        <label class="block text-gray-700 text-sm font-bold mb-2" for="username">
          Correo Electronico
        </label>
        <input
          [(ngModel)]="correo"
          name="correo"
          class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline"
          id="username"
          type="text"
          placeholder="Ingrese su correo electronico"
        />
      </div>
      <div class="mb-6">
        <label class="block text-gray-700 text-sm font-bold mb-2" for="password">
          Contraseña
        </label>
        <input
          [(ngModel)]="contrasena"
          name="contrasena"
          class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 mb-3 leading-tight focus:outline-none focus:shadow-outline"
          id="password"
          type="password"
          placeholder="Ingrese su contraseña"
        />
      </div>
      <p>No tienes una cuenta: <a href="/register" class="text-green-500 hover:text-green-700">Regístrate aquí</a></p>
      <div class="flex items-center justify-between">
        <button
          class="bg-green-500 hover:bg-green-700 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline"
          type="button"
          (click)="onSubmit()"
        >
          Iniciar Sesión
        </button>
      </div>
    </form>
  </div>
</div>
