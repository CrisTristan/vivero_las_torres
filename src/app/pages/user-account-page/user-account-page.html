<div class="h-[87vh] bg-gray-50 py-10 px-4">
  <div class="max-w-2xl mx-auto">
    <!-- Header con avatar -->
    <div class="bg-gradient-to-r from-green-500 to-green-700 rounded-t-2xl p-8 text-center relative">
      <div
        class="w-24 h-24 bg-white rounded-full mx-auto flex items-center justify-center shadow-lg border-4 border-white">
        <span class="material-symbols-outlined text-green-600" style="font-size: 56px">person</span>
      </div>
      <h1 class="text-white text-2xl font-bold mt-4">
        {{ user()?.nombre }} {{ user()?.apellidos }}
      </h1>
      <p class="text-green-100 text-sm mt-1">Miembro de Vivero Las Torres</p>
    </div>

    <!-- Datos del usuario -->
    <div class="bg-white shadow-lg rounded-b-2xl p-8 mb-8">
      <h2 class="text-lg font-semibold text-gray-800 mb-5 flex items-center gap-2">
        <span class="material-symbols-outlined text-green-600">badge</span>
        Información Personal
      </h2>

      <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
        <!-- Nombre -->
        <div class="bg-gray-50 rounded-xl p-4 border border-gray-100">
          <p class="text-xs text-gray-400 uppercase tracking-wider font-semibold mb-1">
            Nombre
          </p>
          <p class="text-gray-800 font-medium text-lg">{{ user()?.nombre }}</p>
        </div>

        <!-- Apellidos -->
        <div class="bg-gray-50 rounded-xl p-4 border border-gray-100">
          <p class="text-xs text-gray-400 uppercase tracking-wider font-semibold mb-1">
            Apellidos
          </p>
          <p class="text-gray-800 font-medium text-lg">
            {{ user()?.apellidos }}
          </p>
        </div>

        <!-- Correo -->
        <div class="bg-gray-50 rounded-xl p-4 border border-gray-100">
          <div class="flex items-center gap-2 mb-1">
            <span class="material-symbols-outlined text-green-500 text-base">mail</span>
            <p class="text-xs text-gray-400 uppercase tracking-wider font-semibold">
              Correo Electrónico
            </p>
          </div>
          <p class="text-gray-800 font-medium">{{ user()?.correo }}</p>
        </div>

        <!-- Teléfono -->
        <div class="bg-gray-50 rounded-xl p-4 border border-gray-100">
          <div class="flex items-center gap-2 mb-1">
            <span class="material-symbols-outlined text-green-500 text-base">phone</span>
            <p class="text-xs text-gray-400 uppercase tracking-wider font-semibold">
              Teléfono
            </p>
          </div>
          <p class="text-gray-800 font-medium">{{ user()?.telefono }}</p>
        </div>
      </div>
    </div>

    <!-- acciones del usuario -->
    <div class="flex flex-col gap-5">
      <div class="border-t-2 border-gray-400">
        <button class="flex items-center gap-2 text-green-600 font-medium"
          (click)="navigateToCustomerPurchaseHistoryPage()">
          <span class="material-symbols-outlined"> deployed_code_history </span>
          Ver Historial de Compras
        </button>
      </div>

      <div>
        <button class="flex items-center gap-2 text-green-600 font-medium"
          (click)="navigateToCustomerShippingDataPage()">
          <span class="material-symbols-outlined"> delivery_truck_speed </span>
          Ver y Editar mis Datos de Envío
        </button>
      </div>

      <!-- Botón cerrar sesión -->
      <div class="text-center pb-20 mt-5">
        <button (click)="onLogout()"
          class="text-red-500 hover:text-red-700 font-medium py-3 px-6 rounded-xl border border-red-200 hover:border-red-400 hover:bg-red-50 transition duration-200 inline-flex items-center gap-2">
          <span class="material-symbols-outlined">logout</span>
          Cerrar Sesión
        </button>
      </div>
    </div>
  </div>
</div>
