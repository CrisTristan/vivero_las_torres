<div 
    class="relative flex flex-col justify-center items-center m-5 bg-green-100 border-green-800 border-2 rounded-lg"
>
    <div class="flex flex-col gap-4 bg-radial from-green-200 from-40% to-emerald-300 p-5">
        <div class="flex flex-col items-center justify-center gap-5">
            <div class="bg-white rounded-full p-4">
                <ng-content select="[serviceIcon]"></ng-content>
            </div>
        <span class="text-xl font-bold">{{ serviceName }}</span>
        </div>
        <p>
          {{serviceDescription}}
        </p>
        <ul class="list-disc list-inside text-left">
          @for(feature of serviceFeatures; track $index) {
            <li>{{feature}}</li>
          }
        </ul>
        <div class="w-full h-px bg-green-800 p-0.3"></div>
        <div>
          <h2 class="text-green-800 font-bold text-xl">Desde ${{servicePrice}}</h2>
        </div>
    </div>
</div>
