<div [class]="'bg-[#eef2ee] border-b border-[#d9e2d9] text-[#4b5563] px-5 md:px-8 flex items-center ' + customClass">
    <div class="w-full flex items-center justify-between gap-4">
        <!-- <div class="relative w-full max-w-[520px]">
            <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-[#9aa39a] text-[20px] leading-none">
                search
            </span>
            <input
                type="text"
                placeholder="Buscar productos, pedidos..."
                class="h-10 w-full rounded-lg bg-[#e8ede8] border border-[#dde5dd] pl-10 pr-3 text-[15px] text-[#4b5563] placeholder:text-[#8d978d] outline-none"
            />
        </div> -->
        <app-search-bar></app-search-bar>

        <div class="flex items-center gap-3">
            @if (showCreateButton) {
                <button
                    type="button"
                    (click)="onCreateButtonClick()"
                    class="h-10 px-4 rounded-xl bg-[#0f766e] text-white text-[14px] font-semibold hover:bg-[#115e59] transition-colors"
                >
                    {{ createButtonLabel }}
                </button>
            }

            <button type="button" class="relative h-9 w-9 flex items-center justify-center text-[#6b7280]"
                (click)="onPressButtonNotification()"
            >
                <span class="material-symbols-outlined text-[22px] leading-none">notifications</span>
                <span class="absolute -right-1 -top-1 h-5 min-w-5 px-1 rounded-full bg-[#178a2d] text-white text-[11px] font-semibold leading-5 text-center">3</span>
            </button>

            @if(isNotificationsOpen()) {
                <div class="absolute top-[60px] right-5 w-80 rounded-lg border border-[#d6e0d6] bg-white shadow-md overflow-hidden z-20">
                    <div class="p-4">
                        <p class="text-sm text-[#374151]">Notificaciones</p>
                        <ul class="mt-2 max-h-60 overflow-y-auto">
                            <li class="py-2 border-b border-[#e5e7eb]">
                                <p class="text-[14px] text-[#4b5563]">Nuevo pedido recibido</p>
                                <p class="text-[12px] text-[#9ca3af]">Hace 5 minutos</p>
                                <button>
                                    <span class="material-symbols-outlined text-[18px] text-[#6b7280] hover:text-[#111827] transition-colors">
                                        delete
                                    </span>
                                </button>
                            </li>
                            <li class="py-2 border-b border-[#e5e7eb]">
                                <p class="text-[14px] text-[#4b5563]">Producto "Maceta de barro" agotado</p>
                                <p class="text-[12px] text-[#9ca3af]">Hace 20 minutos</p>
                            </li>
                            <li class="py-2">
                                <p class="text-[14px] text-[#4b5563]">Nuevo mensaje de cliente</p>
                                <p class="text-[12px] text-[#9ca3af]">Hace 1 hora</p>
                            </li>
                        </ul>
                    </div>
                </div>
            }
        </div>
    </div>
</div>
