<div class="h-[82vh] flex flex-col">
  <div class="flex justify-center">
    <h2 class="text-xl font-bold">Pago seguro</h2>
  </div>
  <div id="payment-element" class="my-3">
    <div class="flex justify-center items-center py-10">
      <div class="w-8 h-8 border-4 border-green-400 border-t-transparent rounded-full animate-spin"></div>
      <span class="ml-3 text-gray-500 text-sm">Cargando formulario de pago...</span>
    </div>
  </div>

  <div class="flex justify-around">
    <p>Total a pagar: <span class="text-green-700 text-xl font-bold">${{ paymentService.getTotalAmount().toFixed(2) }}</span></p>
    <button (click)="pay()" [disabled]="this.loading()" class="bg-green-400 p-4 rounded-xl">
      {{ loading() ? 'Procesando...' : 'Pagar' }}
    </button>
  </div>
</div>
