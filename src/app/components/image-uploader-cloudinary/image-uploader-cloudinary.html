<div class="sm:col-span-2">
    <label class="block text-[14px] font-semibold text-[#374151] mb-1">Imagen del producto</label>
    <input #createFileInput type="file" accept="image/*" class="hidden" (change)="onCreateImageFileSelected($event)" />
    <button type="button" (click)="openCreateFilePicker(createFileInput)"
        class="h-10 px-4 rounded-xl border border-[#d1d5db] text-[#374151] hover:bg-[#f8fafc]">
        Subir imagen
    </button>
    <div class="sm:col-span-2">
        <img [src]="this.imageUrl() || 'https://placehold.co/800x500?text=Sin+imagen'"
            alt="Vista previa de producto" class="w-full h-44 object-cover rounded-xl border border-[#e5e7eb]" />
    </div>
</div>
